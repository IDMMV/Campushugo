<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CampusHugo Pro</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand" onclick="App.go('home')"><span>CH</span><div><b>CampusHugo Pro</b><small>Aprende • Practica • Avanza</small></div></div>
    <button class="hamb" onclick="App.toggleMenu()">☰</button>
    <nav id="nav">
      <button onclick="App.go('home')">Inicio</button><button onclick="App.go('courses')">Cursos</button><button onclick="App.go('resources')">Recursos</button><button onclick="App.go('student')">Mi avance</button><button onclick="App.go('admin')">Admin</button><button class="primary" onclick="App.go('login')">Ingresar</button>
    </nav>
  </header>
  <main id="app"></main>
  <template id="homeTpl">
    <section class="hero">
      <div><p class="pill">VERSIÓN REAL FUNCIONAL • LECCIONES INTERACTIVAS</p><h1>Aprende Excel, Power BI, SQL e IA practicando en pantalla.</h1><p>Esta versión ya tiene navegación funcional, curso demo, lección interactiva, panel de alumno, panel administrador y constructor básico de lecciones.</p><div class="actions"><button class="primary" onclick="App.go('courses')">Ver cursos</button><button onclick="App.go('admin')">Crear lección</button></div></div>
      <div class="heroCard"><h3>Panel rápido</h3><div class="stats"><b>6</b><b>18</b><b>1</b></div><small>Cursos • Lecciones • Curso interactivo activo</small><div class="bar"><i></i></div></div>
    </section>
    <section class="features"><article>🎥 Videos cortos</article><article>🧩 Prácticas guiadas</article><article>🏆 XP y progreso</article><article>📁 Recursos descargables</article></section>
  </template>
  <template id="loginTpl"><section class="panel narrow"><h2>Ingresar</h2><input id="email" placeholder="Correo" value="admin@campushugo.com"><input id="pass" placeholder="Contraseña" type="password" value="admin123"><button class="primary" onclick="App.login()">Entrar</button><p class="muted">Demo local: admin@campushugo.com / admin123. Supabase se conecta en la siguiente configuración.</p></section></template>
  <template id="coursesTpl"><section><h2>Rutas y cursos</h2><div class="grid" id="courseGrid"></div></section></template>
  <template id="resourcesTpl"><section><h2>Biblioteca de recursos</h2><div class="grid" id="resourceGrid"></div></section></template>
  <template id="studentTpl"><section><h2>Mi avance</h2><div class="dashboard"><div class="panel"><h3>XP</h3><strong id="xp">0</strong></div><div class="panel"><h3>Lecciones completadas</h3><strong id="done">0</strong></div><div class="panel"><h3>Último curso</h3><strong>Excel Básico</strong></div></div><button class="primary" onclick="App.openLesson('excel-basico')">Continuar lección</button></section></template>
  <template id="adminTpl"><section><h2>Panel Administrador</h2><div class="dashboard"><div class="panel"><h3>Ventas</h3><strong>S/ 0.00</strong></div><div class="panel"><h3>Suscripciones</h3><strong>0</strong></div><div class="panel"><h3>Descargas</h3><strong>0</strong></div></div><div class="panel"><h3>Constructor de lección interactiva</h3><input id="newTitle" placeholder="Título de lección" value="Seleccionar celdas en Excel"><textarea id="newDesc">El alumno debe identificar la celda B5 y escribir una fórmula SUMA.</textarea><select id="newType"><option value="excel-click">Práctica Excel: clic en celda</option><option value="quiz">Quiz</option><option value="video">Video + práctica</option></select><button class="primary" onclick="App.saveLesson()">Guardar lección</button><p class="muted">Guarda en modo local. Con Supabase se guardará en tabla lessons y lesson_blocks.</p></div><div class="panel"><h3>Subir recurso</h3><input placeholder="Título"><select><option>Excel</option><option>Power BI</option><option>SQL</option><option>PDF</option><option>ZIP</option></select><input type="file"><button>Guardar recurso</button></div></section></template>
  <template id="lessonTpl"><section class="lesson"><aside class="sidebar"><h3>Excel Básico</h3><p>Progreso</p><div class="bar"><i id="lessonBar"></i></div><ol><li class="ok">Qué es Excel</li><li class="active">Conociendo la interfaz</li><li>Seleccionar celdas</li><li>Función SUMA</li></ol><button onclick="App.go('courses')">Salir</button></aside><div class="lessonMain"><p class="pill">Lección interactiva real</p><h2>1.2 Conociendo la interfaz de Excel</h2><p>Observa, practica y gana XP.</p><div class="videoBox"><button onclick="App.playAnimation()">▶ Reproducir explicación</button><div class="excelDemo"><div class="ribbon">Barra de herramientas</div><div class="sheet" id="sheet"></div><span class="callout c1">Columnas</span><span class="callout c2">Filas</span><span class="callout c3">Celda activa</span></div></div><div class="task"><h3>Ahora te toca a ti</h3><p>Haz clic en la celda <b>B5</b>.</p><div class="miniSheet" id="miniSheet"></div><div id="feedback" class="feedback">Esperando tu respuesta...</div><p>Luego escribe la fórmula:</p><input id="formula" placeholder="=SUMA(A1:A10)"><button class="primary" onclick="App.checkFormula()">Validar y terminar</button></div></div><aside class="right"><div class="panel teacher"><h3>Profesor IA</h3><p id="teacherText">Hola, soy tu guía. Primero mira la explicación y luego practica.</p></div><div class="panel"><h3>Puntos clave</h3><ul><li>Excel usa filas y columnas.</li><li>La celda B5 está en columna B, fila 5.</li><li>SUMA usa rangos con dos puntos.</li></ul></div></aside></section></template>
  <script src="js/app.js"></script>
</body>
</html>
